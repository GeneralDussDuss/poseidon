; POSEIDON — Keyboard-first pentesting firmware for M5Stack Cardputer-Adv.
;
; Target hardware: M5Stack Cardputer-Adv (K126-Adv)
;   ESP32-S3 @ 240 MHz, 8MB PSRAM, 8MB flash
;   1.14" LCD 240x135 (ST7789v2), TCA8418 I2C keyboard matrix
;   IR LED, microSD, I2S speaker, PDM mic, USB-C, Grove I2C
;   Keyboard on I2C frees GPIO 3/4/5/6/7/13/15 for hats (LoRa1262, etc).

[env:cardputer]
; pioarduino 55.03.38 (Arduino 3.3.8 / IDF 5.5.4) + Bruce's patched WiFi libs.
; Required for deauth frames to land on-air — stock IDF 5.3 blob filters
; subtypes 0xC/0xA regardless of TX path. Bruce uses this exact stack.
; Rollback: cp platformio.ini.stable platformio.ini
platform              = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
; Use Bruce's pinned lib build (20260123) not the latest. The 20260407 zip
; still has `unsupport frame type` filter in libnet80211.a — on-device tests
; returned rc=258 with that build. 20260123 is what Bruce's own platformio.ini
; uses and what we know works.
platform_packages     = framework-arduinoespressif32-libs @ https://github.com/bmorcelli/esp32-arduino-lib-builder/releases/download/idf-release_v5.5/bruce_esp32-arduino-libs-20260123-153546.zip
board                 = m5stack-stamps3
framework             = arduino
monitor_speed         = 115200
upload_speed          = 460800
upload_flags =
    --no-stub

; PSRAM is broken on this particular Cardputer unit — ID reads back as
; 0xffffff or 0x0 regardless of qio_opi/qio_qspi. Disabling entirely so
; no code path (BLE, slide transitions, etc.) assumes PSRAM exists.
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=2
    -DPOSEIDON_VERSION=\"0.4.0\"
    -std=gnu++17
    -Wall
    ; Override libnet80211.a's ieee80211_raw_frame_sanity_check (which
    ; filters deauth/disassoc subtypes) with our stub in
    ; src/features/wifi_sanity_override.cpp. --allow-multiple-definition
    ; makes the linker silently prefer our .o over the library's .a —
    ; ours is encountered first.
    -Wl,--allow-multiple-definition

build_unflags = -std=gnu++11

lib_deps =
    m5stack/M5Cardputer @ ^1.1.1
    m5stack/M5Unified   @ ^0.2.13
    ; NimBLE 2.x required for IDF 5.5 (1.4.1 crashes at BLE init on Core 3.3.8)
    h2zero/NimBLE-Arduino @ ^2.3.9
    marian-craciunescu/ESP32Ping @ ^1.7
    jgromes/RadioLib @ 7.4.0
    lsatan/SmartRC-CC1101-Driver-Lib @ ^2.5.7
    sui77/rc-switch @ ^2.6.4
    nrf24/RF24 @ ^1.4.11

monitor_filters = esp32_exception_decoder, colorize
